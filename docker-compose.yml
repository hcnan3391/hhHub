version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: hhHub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: mysql://root:root@db:3306/hhHub
    depends_on:
      - db

volumes:
  mysql_data:
