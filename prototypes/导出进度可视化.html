<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出进度可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        /* 导出控制面板 */
        .export-panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .export-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .export-btn {
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .export-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .export-btn .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .export-btn .label {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .export-btn .desc {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        /* 进度卡片 */
        .progress-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: none;
        }

        .progress-card.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 导出头部信息 */
        .export-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .export-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .export-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .export-icon.excel { background: #dcfce7; }
        .export-icon.pdf { background: #fee2e2; }
        .export-icon.csv { background: #ffedd5; }
        .export-icon.zip { background: #f3e8ff; }

        .export-meta h3 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .export-meta p {
            font-size: 13px;
            color: #888;
        }

        .export-status {
            text-align: right;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-badge.exporting {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-badge.success {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-badge.error {
            background: #fee2e2;
            color: #dc2626;
        }

        .status-badge.waiting {
            background: #f3f4f6;
            color: #666;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 进度条区域 */
        .progress-area {
            margin-bottom: 20px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }

        .progress-percent {
            font-weight: 600;
            color: #667eea;
        }

        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-fill.success {
            background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
        }

        .progress-fill.error {
            background: linear-gradient(90deg, #dc2626 0%, #b91c1c 100%);
        }

        /* 详细进度信息 */
        .progress-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .detail-item {
            text-align: center;
        }

        .detail-value {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .detail-label {
            font-size: 12px;
            color: #888;
        }

        /* 操作按钮 */
        .export-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-danger {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        /* 批量导出队列 */
        .queue-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .queue-title {
            font-size: 18px;
            font-weight: 600;
        }

        .queue-count {
            font-size: 13px;
            color: #888;
        }

        .queue-list {
            space-y: 12px;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .queue-item:hover {
            background: #f0f7ff;
        }

        .queue-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .queue-item-info {
            flex: 1;
        }

        .queue-item-name {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a2e;
            margin-bottom: 2px;
        }

        .queue-item-size {
            font-size: 12px;
            color: #888;
        }

        .queue-item-progress {
            width: 120px;
        }

        .queue-item-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .queue-item-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .queue-item-percent {
            font-size: 12px;
            color: #666;
            text-align: right;
        }

        .queue-item-status {
            font-size: 12px;
            color: #667eea;
            font-weight: 500;
        }

        .queue-item-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #f0f0f0;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-text {
            font-size: 14px;
        }

        /* Toast 通知 */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            animation: toastSlide 0.3s ease;
        }

        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .toast-icon.success {
            background: #dcfce7;
        }

        .toast-icon.error {
            background: #fee2e2;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 2px;
        }

        .toast-desc {
            font-size: 13px;
            color: #666;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .progress-details {
                grid-template-columns: 1fr;
            }

            .export-header {
                flex-direction: column;
                gap: 12px;
            }

            .export-status {
                text-align: left;
            }

            .queue-item {
                flex-wrap: wrap;
            }

            .queue-item-progress {
                width: 100%;
                order: 3;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📤 导出进度可视化</h1>
            <p>文件导出进度跟踪与管理</p>
        </div>

        <!-- 导出控制面板 -->
        <div class="export-panel">
            <div class="panel-title">选择导出格式</div>
            <div class="export-options">
                <div class="export-btn" onclick="startExport('excel')">
                    <div class="icon">📊</div>
                    <div class="label">Excel</div>
                    <div class="desc">.xlsx 格式</div>
                </div>
                <div class="export-btn" onclick="startExport('pdf')">
                    <div class="icon">📄</div>
                    <div class="label">PDF</div>
                    <div class="desc">.pdf 格式</div>
                </div>
                <div class="export-btn" onclick="startExport('csv')">
                    <div class="icon">📋</div>
                    <div class="label">CSV</div>
                    <div class="desc">.csv 格式</div>
                </div>
                <div class="export-btn" onclick="startExport('zip')">
                    <div class="icon">🗜️</div>
                    <div class="label">压缩包</div>
                    <div class="desc">.zip 格式</div>
                </div>
            </div>
        </div>

        <!-- 单文件导出进度 -->
        <div class="progress-card" id="singleExportCard">
            <div class="export-header">
                <div class="export-info">
                    <div class="export-icon excel" id="exportIcon">📊</div>
                    <div class="export-meta">
                        <h3 id="exportFilename">销售数据导出.xlsx</h3>
                        <p id="exportDesc">正在准备数据，请勿关闭页面...</p>
                    </div>
                </div>
                <div class="export-status">
                    <span class="status-badge exporting" id="exportStatusBadge">
                        <span class="spinner"></span>
                        导出中
                    </span>
                </div>
            </div>

            <div class="progress-area">
                <div class="progress-info">
                    <span id="exportStatusText">正在导出数据...</span>
                    <span class="progress-percent" id="exportPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="exportProgressBar" style="width: 0%"></div>
                </div>
            </div>

            <div class="progress-details">
                <div class="detail-item">
                    <div class="detail-value" id="detailRows">0</div>
                    <div class="detail-label">已处理行数</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="detailSize">0 MB</div>
                    <div class="detail-label">文件大小</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="detailTime">00:00</div>
                    <div class="detail-label">预计剩余</div>
                </div>
            </div>

            <div class="export-actions">
                <button class="btn btn-secondary" id="cancelBtn" onclick="cancelExport()">取消</button>
                <button class="btn btn-primary" id="downloadBtn" disabled onclick="downloadFile()">
                    📥 下载文件
                </button>
            </div>
        </div>

        <!-- 批量导出队列 -->
        <div class="queue-card">
            <div class="queue-header">
                <div class="queue-title">导出队列</div>
                <div class="queue-count" id="queueCount">0 个任务</div>
            </div>
            <div class="queue-list" id="queueList">
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <div class="empty-text">暂无导出任务，点击上方按钮开始导出</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        let currentExport = null;
        let exportQueue = [];
        let exportIdCounter = 0;

        const exportConfig = {
            excel: { icon: '📊', color: 'excel', name: 'Excel', ext: '.xlsx' },
            pdf: { icon: '📄', color: 'pdf', name: 'PDF', ext: '.pdf' },
            csv: { icon: '📋', color: 'csv', name: 'CSV', ext: '.csv' },
            zip: { icon: '🗜️', color: 'zip', name: '压缩包', ext: '.zip' }
        };

        // 开始导出
        function startExport(type) {
            const config = exportConfig[type];
            const id = ++exportIdCounter;

            const exportItem = {
                id: id,
                type: type,
                filename: `数据导出_${new Date().toLocaleTimeString()}${config.ext}`,
                progress: 0,
                status: 'exporting',
                rows: 0,
                totalRows: Math.floor(Math.random() * 50000) + 10000,
                size: 0
            };

            exportQueue.push(exportItem);
            updateQueueDisplay();

            // 显示单文件进度卡片
            showSingleExport(exportItem);

            // 模拟导出进度
            simulateExport(exportItem);
        }

        // 显示单文件导出卡片
        function showSingleExport(item) {
            const config = exportConfig[item.type];
            const card = document.getElementById('singleExportCard');

            document.getElementById('exportIcon').textContent = config.icon;
            document.getElementById('exportIcon').className = `export-icon ${config.color}`;
            document.getElementById('exportFilename').textContent = item.filename;
            document.getElementById('exportDesc').textContent = '正在准备数据，请勿关闭页面...';
            document.getElementById('exportStatusBadge').className = 'status-badge exporting';
            document.getElementById('exportStatusBadge').innerHTML = '<span class="spinner"></span>导出中';
            document.getElementById('exportStatusText').textContent = '正在导出数据...';
            document.getElementById('exportPercent').textContent = '0%';
            document.getElementById('exportProgressBar').style.width = '0%';
            document.getElementById('exportProgressBar').className = 'progress-fill';
            document.getElementById('detailRows').textContent = '0';
            document.getElementById('detailSize').textContent = '0 MB';
            document.getElementById('detailTime').textContent = '计算中...';
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('cancelBtn').style.display = 'inline-flex';

            card.classList.add('show');
        }

        // 模拟导出进度
        function simulateExport(item) {
            currentExport = item;
            let progress = 0;

            const interval = setInterval(() => {
                if (item.status === 'cancelled') {
                    clearInterval(interval);
                    return;
                }

                // 非线性增长模拟
                const increment = Math.random() * 15 + 5;
                progress += increment;

                if (progress >= 100) {
                    progress = 100;
                    item.status = 'success';
                    clearInterval(interval);
                    completeExport(item);
                }

                item.progress = progress;
                item.rows = Math.floor((progress / 100) * item.totalRows);
                item.size = (progress * 0.15).toFixed(1);

                updateSingleExport(item);
                updateQueueDisplay();
            }, 300);
        }

        // 更新单文件导出显示
        function updateSingleExport(item) {
            document.getElementById('exportProgressBar').style.width = item.progress + '%';
            document.getElementById('exportPercent').textContent = Math.floor(item.progress) + '%';
            document.getElementById('detailRows').textContent = item.rows.toLocaleString();
            document.getElementById('detailSize').textContent = item.size + ' MB';

            const remaining = Math.ceil((100 - item.progress) / 20);
            document.getElementById('detailTime').textContent = remaining + ' 秒';

            // 更新状态文本
            if (item.progress < 30) {
                document.getElementById('exportStatusText').textContent = '正在准备数据...';
            } else if (item.progress < 60) {
                document.getElementById('exportStatusText').textContent = '正在生成文件...';
            } else if (item.progress < 90) {
                document.getElementById('exportStatusText').textContent = '正在压缩文件...';
            } else if (item.progress < 100) {
                document.getElementById('exportStatusText').textContent = '即将完成...';
            }
        }

        // 完成导出
        function completeExport(item) {
            // 更新单文件卡片
            document.getElementById('exportStatusBadge').className = 'status-badge success';
            document.getElementById('exportStatusBadge').textContent = '✓ 完成';
            document.getElementById('exportStatusText').textContent = '导出成功！';
            document.getElementById('exportProgressBar').classList.add('success');
            document.getElementById('exportDesc').textContent = '文件已准备好，点击下方按钮下载';
            document.getElementById('detailTime').textContent = '已完成';
            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('cancelBtn').style.display = 'none';

            // 显示成功通知
            showToast('success', '导出完成', `${item.filename} 已成功导出`);

            updateQueueDisplay();
        }

        // 取消导出
        function cancelExport() {
            if (currentExport) {
                currentExport.status = 'cancelled';

                document.getElementById('exportStatusBadge').className = 'status-badge error';
                document.getElementById('exportStatusBadge').textContent = '✕ 已取消';
                document.getElementById('exportStatusText').textContent = '导出已取消';
                document.getElementById('exportProgressBar').classList.add('error');
                document.getElementById('cancelBtn').style.display = 'none';

                showToast('error', '导出取消', '导出任务已被取消');
                updateQueueDisplay();
            }
        }

        // 下载文件
        function downloadFile() {
            if (currentExport) {
                showToast('success', '开始下载', `${currentExport.filename} 开始下载`);
            }
        }

        // 更新队列显示
        function updateQueueDisplay() {
            const queueList = document.getElementById('queueList');
            const queueCount = document.getElementById('queueCount');

            queueCount.textContent = `${exportQueue.length} 个任务`;

            if (exportQueue.length === 0) {
                queueList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-text">暂无导出任务，点击上方按钮开始导出</div>
                    </div>
                `;
                return;
            }

            queueList.innerHTML = exportQueue.slice().reverse().map(item => {
                const config = exportConfig[item.type];
                let statusHtml = '';

                if (item.status === 'exporting') {
                    statusHtml = `
                        <div class="queue-item-progress">
                            <div class="queue-item-bar">
                                <div class="queue-item-fill" style="width: ${item.progress}%"></div>
                            </div>
                            <div class="queue-item-percent">${Math.floor(item.progress)}%</div>
                        </div>
                        <div class="queue-item-actions">
                            <button class="icon-btn" onclick="removeFromQueue(${item.id})">✕</button>
                        </div>
                    `;
                } else if (item.status === 'success') {
                    statusHtml = `
                        <div class="queue-item-status" style="color: #16a34a;">✓ 完成</div>
                        <div class="queue-item-actions">
                            <button class="icon-btn" onclick="downloadFromQueue(${item.id})">⬇️</button>
                            <button class="icon-btn" onclick="removeFromQueue(${item.id})">🗑️</button>
                        </div>
                    `;
                } else if (item.status === 'cancelled' || item.status === 'error') {
                    statusHtml = `
                        <div class="queue-item-status" style="color: #dc2626;">✕ 失败</div>
                        <div class="queue-item-actions">
                            <button class="icon-btn" onclick="retryExport(${item.id})">🔄</button>
                            <button class="icon-btn" onclick="removeFromQueue(${item.id})">🗑️</button>
                        </div>
                    `;
                }

                return `
                    <div class="queue-item">
                        <div class="queue-item-icon" style="background: ${getIconBg(item.type)}">
                            ${config.icon}
                        </div>
                        <div class="queue-item-info">
                            <div class="queue-item-name">${item.filename}</div>
                            <div class="queue-item-size">${item.size > 0 ? item.size + ' MB' : '计算中...'}</div>
                        </div>
                        ${statusHtml}
                    </div>
                `;
            }).join('');
        }

        function getIconBg(type) {
            const bgs = {
                excel: '#dcfce7',
                pdf: '#fee2e2',
                csv: '#ffedd5',
                zip: '#f3e8ff'
            };
            return bgs[type] || '#f3f4f6';
        }

        // 从队列移除
        function removeFromQueue(id) {
            exportQueue = exportQueue.filter(item => item.id !== id);
            updateQueueDisplay();
        }

        // 从队列下载
        function downloadFromQueue(id) {
            const item = exportQueue.find(i => i.id === id);
            if (item) {
                showToast('success', '开始下载', `${item.filename} 开始下载`);
            }
        }

        // 重试导出
        function retryExport(id) {
            const item = exportQueue.find(i => i.id === id);
            if (item) {
                item.status = 'exporting';
                item.progress = 0;
                updateQueueDisplay();
                simulateExport(item);
            }
        }

        // 显示 Toast
        function showToast(type, title, desc) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div class="toast-icon ${type}">${type === 'success' ? '✓' : '✕'}</div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-desc">${desc}</div>
                </div>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastSlide 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>
</body>
</html>
