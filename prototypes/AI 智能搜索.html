<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能搜索</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        /* 搜索框区域 */
        .search-container {
            position: relative;
            margin-bottom: 24px;
        }

        .search-box {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .search-input-wrapper {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            gap: 12px;
        }

        .search-icon {
            width: 24px;
            height: 24px;
            color: #999;
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 17px;
            color: #333;
            background: transparent;
            min-width: 0;
        }

        .search-input::placeholder {
            color: #aaa;
        }

        .search-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #e8e8e8;
        }

        .search-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        /* AI 模式标签 */
        .ai-mode-tabs {
            display: flex;
            padding: 0 20px 12px;
            gap: 8px;
            border-bottom: 1px solid #f0f0f0;
        }

        .ai-tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f5f5f5;
            color: #666;
        }

        .ai-tab:hover {
            background: #e8e8e8;
        }

        .ai-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* 下拉建议 */
        .suggestions {
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-section {
            padding: 12px 0;
        }

        .suggestion-title {
            padding: 4px 20px 8px;
            font-size: 12px;
            color: #999;
            font-weight: 500;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .suggestion-item:hover {
            background: #f8f9ff;
        }

        .suggestion-icon {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            color: #999;
        }

        .suggestion-text {
            flex: 1;
            font-size: 15px;
            color: #333;
        }

        .suggestion-text mark {
            background: #fef08a;
            color: #854d0e;
            padding: 0 2px;
            border-radius: 2px;
        }

        /* AI 问答区域 */
        .ai-answer {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .ai-answer.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .ai-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .ai-info h3 {
            font-size: 16px;
            color: #333;
        }

        .ai-info span {
            font-size: 13px;
            color: #667eea;
        }

        .ai-content {
            font-size: 15px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 16px;
        }

        .ai-sources {
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }

        .ai-sources-title {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .source-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .source-tag {
            padding: 6px 12px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 13px;
            color: #666;
        }

        /* 搜索结果 */
        .results-container {
            display: none;
        }

        .results-container.show {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .results-count {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
        }

        .results-filters {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 6px 14px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 20px;
            font-size: 13px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: white;
            color: #667eea;
        }

        /* 结果卡片 */
        .result-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .result-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .result-icon.doc { background: #dbeafe; }
        .result-icon.sheet { background: #dcfce7; }
        .result-icon.slide { background: #fef3c7; }
        .result-icon.pdf { background: #fee2e2; }

        .result-meta {
            flex: 1;
        }

        .result-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 2px;
        }

        .result-path {
            font-size: 12px;
            color: #888;
        }

        .result-desc {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .result-desc mark {
            background: #fef08a;
            color: #854d0e;
            padding: 0 2px;
        }

        .result-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-tags {
            display: flex;
            gap: 6px;
        }

        .result-tag {
            padding: 4px 10px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
        }

        .result-time {
            font-size: 12px;
            color: #999;
        }

        /* 快捷入口 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        @media (max-width: 640px) {
            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .quick-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .quick-card:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }

        .quick-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .quick-label {
            font-size: 14px;
            color: white;
            font-weight: 500;
        }

        /* 加载状态 */
        .loading-state {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .loading-state.show {
            display: block;
        }

        .loading-dots {
            display: inline-flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .loading-dot {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .loading-text {
            color: white;
            font-size: 15px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.8);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            opacity: 0.8;
        }

        /* 语音动画 */
        .voice-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .voice-overlay.show {
            display: flex;
        }

        .voice-box {
            text-align: center;
            color: white;
        }

        .voice-waves {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 80px;
            margin-bottom: 24px;
        }

        .voice-wave {
            width: 6px;
            background: #667eea;
            border-radius: 3px;
            animation: voice 1s ease-in-out infinite;
        }

        .voice-wave:nth-child(1) { height: 20px; animation-delay: 0s; }
        .voice-wave:nth-child(2) { height: 40px; animation-delay: 0.1s; }
        .voice-wave:nth-child(3) { height: 60px; animation-delay: 0.2s; }
        .voice-wave:nth-child(4) { height: 40px; animation-delay: 0.3s; }
        .voice-wave:nth-child(5) { height: 20px; animation-delay: 0.4s; }

        @keyframes voice {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }

        .voice-text {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .voice-hint {
            font-size: 14px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🔍 AI 智能搜索</h1>
            <p>基于大模型的企业知识库智能检索</p>
        </div>

        <!-- 快捷入口 -->
        <div class="quick-actions" id="quickActions">
            <div class="quick-card" onclick="quickSearch('本周销售数据')">

                <!-- AI 模式选择 -->
                <div class="ai-mode-tabs">

                    <div class="ai-tab" data-mode="data" onclick="setMode('data')">

                <div class="suggestions" id="suggestions">

                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>

                    </div>
                    <div class="suggestion-section">

                        <div class="suggestion-item" onclick="selectSuggestion('2024年度规划')">
                            <svg class="suggestion-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #f59e0b;">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>

                        </div>
                        <div class="suggestion-item" onclick="selectSuggestion('新人入职指南')">
                            <svg class="suggestion-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #f59e0b;">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                            </svg>
                            <span class="suggestion-text">新人入职指南</span>

                </div>
            </div>
        </div>

        <!-- 加载状态 -->
        <div class="loading-state" id="loadingState">
            <div class="loading-dots">
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
            </div>
            <div class="loading-text">AI 正在思考...</div>

        <!-- AI 答案区域 -->
        <div class="ai-answer" id="aiAnswer">
            <div class="ai-header">

                <div class="ai-info">

                    <span>基于企业知识库生成</span>

            </div>
            <div class="ai-content" id="aiContent">

            <div class="ai-sources">

        <!-- 搜索结果 -->
        <div class="results-container" id="resultsContainer">

            <div id="resultsList">

        <!-- 空状态 -->

    <!-- 语音搜索 -->

        let currentMode = 'all';
        let isSearching = false;

        // DOM 元素
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const suggestions = document.getElementById('suggestions');
        const loadingState = document.getElementById('loadingState');
        const aiAnswer = document.getElementById('aiAnswer');
        const aiContent = document.getElementById('aiContent');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsList = document.getElementById('resultsList');
        const emptyState = document.getElementById('emptyState');
        const voiceOverlay = document.getElementById('voiceOverlay');
        const quickActions = document.getElementById('quickActions');

        // 事件监听
        searchInput.addEventListener('input', (e) => {
            clearBtn.style.display = e.target.value ? 'flex' : 'none';
            if (e.target.value) {
                suggestions.classList.add('show');
            } else {
                suggestions.classList.remove('show');
            }
        });

        searchInput.addEventListener('focus', () => {
            if (searchInput.value) {
                suggestions.classList.add('show');
            }
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                suggestions.classList.remove('show');
                performSearch();
            }
            if (e.key === 'Escape') {
                suggestions.classList.remove('show');
            }
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.style.display = 'none';
            searchInput.focus();
            resetView();
        });

        voiceBtn.addEventListener('click', startVoiceSearch);

        voiceOverlay.addEventListener('click', () => {
            voiceOverlay.classList.remove('show');
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-box')) {
                suggestions.classList.remove('show');
            }
        });

        // 模式切换
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.ai-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
        }

        // 快速搜索
        function quickSearch(query) {
            searchInput.value = query;
            clearBtn.style.display = 'flex';
            performSearch();
        }

        // 选择建议
        function selectSuggestion(text) {
            searchInput.value = text;
            suggestions.classList.remove('show');
            performSearch();
        }

        // 语音搜索
        function startVoiceSearch() {
            voiceOverlay.classList.add('show');

            setTimeout(() => {
                voiceOverlay.classList.remove('show');
                searchInput.value = '本周销售数据怎么样';
                clearBtn.style.display = 'flex';
                performSearch();
            }, 3000);
        }

        // 执行搜索
        function performSearch() {
            const query = searchInput.value.trim();
            if (!query || isSearching) return;

            isSearching = true;

            // 隐藏其他区域
            emptyState.style.display = 'none';
            quickActions.style.display = 'none';
            aiAnswer.classList.remove('show');
            resultsContainer.classList.remove('show');

            // 显示加载
            loadingState.classList.add('show');

            // 模拟搜索延迟
            setTimeout(() => {
                loadingState.classList.remove('show');
                isSearching = false;

                // 根据模式显示结果
                if (currentMode === 'ai') {
                    showAIAnswer(query);
                } else {
                    showAIAndResults(query);
                }
            }, 1500);
        }

        // 显示 AI 答案 + 搜索结果
        function showAIAndResults(query) {
            // AI 回答
            let response = aiResponses.default;
            if (query.includes('流程') || query.includes('步骤')) {
                response = aiResponses['流程'];
            } else if (query.includes('会议') || query.includes('纪要')) {
                response = aiResponses['会议'];
            }

            aiContent.innerHTML = response.replace(/\n\n/g, '<br><br>').replace(/•/g, '&bull;');
            aiAnswer.classList.add('show');

            // 搜索结果
            renderResults(query);
            resultsContainer.classList.add('show');
        }

        // 纯 AI 模式
        function showAIAnswer(query) {
            let response = aiResponses.default;
            if (query.includes('流程')) {
                response = aiResponses['流程'];
            } else if (query.includes('会议')) {
                response = aiResponses['会议'];
            }

            aiContent.innerHTML = response.replace(/\n\n/g, '<br><br>').replace(/•/g, '&bull;');
            aiAnswer.classList.add('show');
        }

        // 渲染搜索结果
        function renderResults(query) {
            const html = mockResults.map(item => `
                <div class="result-card" onclick="openResult(${item.id})">
                    <div class="result-header">
                        <div class="result-icon ${item.icon}">${item.iconEmoji}</div>
                        <div class="result-meta">
                            <div class="result-title">${highlightText(item.title, query)}</div>
                            <div class="result-path">${item.path}</div>
                        </div>
                    </div>
                    <div class="result-desc">${highlightText(item.desc, query)}</div>
                    <div class="result-footer">
                        <div class="result-tags">
                            ${item.tags.map(tag => `<span class="result-tag">${tag}</span>`).join('')}
                        </div>
                        <span class="result-time">${item.time}</span>
                    </div>
                </div>
            `).join('');

            resultsList.innerHTML = html;
        }

        // 高亮文本
        function highlightText(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${escapeRegExp(query)})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 打开结果
        function openResult(id) {
            alert(`打开文档 ID: ${id}\n\n实际项目中会跳转到文档详情页`);
        }

        // 重置视图
        function resetView() {
            emptyState.style.display = 'block';
            quickActions.style.display = 'grid';
            aiAnswer.classList.remove('show');
            resultsContainer.classList.remove('show');
        }
    </script>
</body>
</html>
